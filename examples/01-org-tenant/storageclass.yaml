# Model A — directory-backed (dir/v1) StorageClass, pinned to the tenant's
# pre-created filesystem inside their WEKA Organization.
# Derived from official examples/dynamic_directory/storageclass-wekafs-dir-api.yaml.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: storageclass-wekafs-dir-tenant-a
provisioner: csi.weka.io
reclaimPolicy: Delete
volumeBindingMode: Immediate
allowVolumeExpansion: true
parameters:
  volumeType: dir/v1
  filesystemName: tenant-a-fs            # pre-created by the operator in the org
  # capacity enforcement: HARD blocks writes above quota; SOFT only warns
  capacityEnforcement: HARD

  # optional volume ownership/permissions
  #ownerUid: "1000"
  #ownerGid: "1000"
  #permissions: "0775"

  # the tenant-scoped Secret (same one wired into every slot below)
  csi.storage.k8s.io/provisioner-secret-name: &secretName csi-wekafs-api-secret
  csi.storage.k8s.io/provisioner-secret-namespace: &secretNamespace csi-wekafs
  csi.storage.k8s.io/controller-publish-secret-name: *secretName
  csi.storage.k8s.io/controller-publish-secret-namespace: *secretNamespace
  csi.storage.k8s.io/controller-expand-secret-name: *secretName
  csi.storage.k8s.io/controller-expand-secret-namespace: *secretNamespace
  csi.storage.k8s.io/node-stage-secret-name: *secretName
  csi.storage.k8s.io/node-stage-secret-namespace: *secretNamespace
  csi.storage.k8s.io/node-publish-secret-name: *secretName
  csi.storage.k8s.io/node-publish-secret-namespace: *secretNamespace
