# Smoke test: a directory-backed PVC + a pod that writes to it every 5s.
# Exact manifest validated in the lab on 2026-07-01 (see verify.md).
#
# Observed result:
#   pvc-tenant-a  Bound  1Gi  RWX  sc-tenant-a-dir
#   PV handle:    dir/v1/tenant-a-fs/csi-volumes/pvc-9cf3dd3a-...
#   pod app-tenant-a  1/1 Running; /data is a `type wekafs` mount, read/write OK
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: pvc-tenant-a
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: sc-tenant-a-dir
  volumeMode: Filesystem
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: app-tenant-a
spec:
  containers:
    - name: writer
      image: busybox
      command: ["/bin/sh", "-c", "while true; do date >> /data/temp.txt; sleep 5; done"]
      volumeMounts:
        - name: wekafs
          mountPath: /data
  volumes:
    - name: wekafs
      persistentVolumeClaim:
        claimName: pvc-tenant-a
