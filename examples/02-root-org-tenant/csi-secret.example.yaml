# Model B — root org, dedicated filesystem: tenant-scoped CSI credentials.
#
# This is the exact Secret validated in the lab on 2026-07-01 (see verify.md),
# with the password redacted. The user is a dedicated `csi`-role user — NEVER
# admin/ClusterAdmin. NOTE: a Root-org user has no org boundary; the `csi` role
# limits WHAT it can do, and the StorageClass pins WHICH filesystem — but it is not
# confined to an org the way Model A is. See ../../docs/secrets-and-access.md.
#
# Usage: copy to csi-secret.yaml (gitignored), fill the real password, then
#   kubectl apply -f csi-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: csi-wekafs-api-secret-b          # single tenant? drop the -b suffix
  namespace: csi-wekafs
type: Opaque
stringData:                              # plaintext; k8s base64-encodes on write
  username: tenant-b-csi                 # `csi`-role user in the root org
  password: "<TENANT_B_PASSWORD>"
  organization: Root                     # root org — no org isolation boundary
  scheme: https                          # HTTPS mandatory since Weka 4.3.0
  endpoints: "10.0.0.3:14000"            # backend LB IP (lab value — use yours; ≥2 in prod)
  autoUpdateEndpoints: "false"           # "true" only for autoscaling backends w/o LB
  localContainerName: ""                 # set only on multi-cluster hosts
  nfsTargetIps: ""                       # only for NFS transport w/o NFS-group IPs
  caCertificate: ""                      # base64 PEM for a private CA (see note below)
#
# NOTE: the lab cluster's API used a self-signed cert, so the plugin was installed
# with `--set pluginConfig.allowInsecureHttps=true`. In production, put the API's
# CA (base64 PEM) in caCertificate above and leave allowInsecureHttps unset.
