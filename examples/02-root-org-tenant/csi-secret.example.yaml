# Model B — root org, dedicated filesystem: tenant-scoped CSI credentials.
#
# NEVER put ClusterAdmin/admin creds here. This is a 'regular' (non-admin) user in
# the root org. NOTE: a regular user in the root org can VIEW all filesystems
# cluster-wide — isolation relies on the StorageClass pinning filesystemName + a
# quota. Weaker than Model A. See ../../docs/secrets-and-access.md.
#
# Usage: copy to csi-secret.yaml (gitignored), fill real values, then
#   kubectl apply -f csi-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: csi-wekafs-api-secret
  namespace: csi-wekafs
type: Opaque
stringData:                              # plaintext; k8s base64-encodes on write
  username: tenant-a-csi                 # non-admin (regular) user — NOT admin
  password: "<TENANT_A_PASSWORD>"
  organization: Root                     # root org — no org isolation boundary
  scheme: https                          # HTTPS mandatory since Weka 4.3.0
  endpoints: "10.0.0.11:14000,10.0.0.12:14000"   # >=2 mgmt endpoints, or an LB
  autoUpdateEndpoints: "false"           # "true" only for autoscaling backends w/o LB
  localContainerName: ""                 # set only on multi-cluster hosts
  nfsTargetIps: ""                       # only for NFS transport w/o NFS-group IPs
  caCertificate: ""                      # base64 PEM if https uses a private CA
